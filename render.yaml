services:
  # Backend API
  - type: web
    name: ordenaya-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ordenaya-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://ordenaya-web.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Base de datos PostgreSQL
  - type: postgresql
    name: ordenaya-db
    plan: free

  # Frontend Estático
  - type: static
    name: ordenaya-web
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ordenaya-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://ordenaya-api.onrender.com